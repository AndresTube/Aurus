        - "[message] <green>link to the documentation ahhh placeholder"
        - "close"

    rules_btn:
      type: "BUTTON"
      text: "<blue>[ Example #1 ]"
      x: 1.2
      y: -0.4
      scale: 1.2
      actions:
        - "[message] <green>Opening welcome_server..."
        - "[openmenu] welcome_server"
        - "close"


    footer:
      type: "TEXT"
      text: "<dark_gray>~ Fendrixx</dark_gray>"
      background: false
      x: 0.0
      y: -1.0
      scale: 0.7