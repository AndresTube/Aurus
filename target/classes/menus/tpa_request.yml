tpa_request:
  type: "FOLLOW"
  distance: 2.5
  update-in-ticks: 5
  components:
    title:
      type: "TEXT"
      text: "<gradient:gold:yellow><b>TPA request</b></gradient>"
      x: 0.0
      y: 1.0
      size: 2.0
      animations:
        y-formula: "0.8 + (0.05 * sin(t * 2))"

    info_player:
      type: "TEXT"
      text: "<white>Someone wants to teleport to you"
      x: 0.0
      y: 0.5

    button_accept:
      type: "BUTTON"
      text: "<green><b>[ Accept ]</b>"
      x: -0.6
      y: 0.0
      actions:
        - "[console] tpaccept"
        - "[close]"

    button_cancel:
      type: "BUTTON"
      text: "<red><b>[ Cancel ]</b>"
      x: 0.6
      y: 0.0
      actions:
        - "[console] tpadeny"
        - "[close]"